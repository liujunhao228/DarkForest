# ============================================================
# 黑暗森林 (Dark Forest) - Docker Compose (生产环境覆盖)
# 用法: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # -------------------- 主应用 (生产覆盖) --------------------
  app:
    build:
      target: production              # 使用生产阶段
    container_name: darkforest-prod
    restart: always                   # 自动重启
    ports:
      - "127.0.0.1:3000:3000"         # 仅本地暴露 (配合反向代理)
      - "127.0.0.1:3003:3003"         # WebSocket 仅本地暴露
    volumes:
      - prod-db-data:/app/db          # 生产数据库持久化
    env_file:
      - .env                          # 加载环境变量
    environment:
      - NODE_ENV=production
    depends_on:
      init-db-prod:
        condition: service_completed_successfully
    networks:
      - darkforest-net
    # 安全加固
    security_opt:
      - no-new-privileges:true
    read_only: false                  # SQLite 需要写入
    cap_drop:
      - ALL                           # 丢弃所有 Linux capabilities
    cap_add:
      - NET_BIND_SERVICE              # 仅保留网络绑定能力 (如果需要)
    # 临时文件系统 - 避免写入容器层
    tmpfs:
      - /tmp                          # 临时文件
      - /app/.cache                   # 构建缓存
    # 日志轮转配置 - 防止磁盘耗尽
    logging:
      driver: json-file
      options:
        max-size: "10m"               # 单个日志文件最大 10MB
        max-file: "5"                 # 保留 5 个日志文件
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 512M
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -------------------- 生产数据库初始化 --------------------
  init-db-prod:
    build:
      context: .
      target: production
    container_name: darkforest-init-db-prod
    volumes:
      - prod-db-data:/app/db
    environment:
      - DATABASE_URL=file:/app/db/custom.db
    command: sh -c "bun run db:generate && bun run db:push"
    networks:
      - darkforest-net
    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # -------------------- Caddy 反向代理 (生产推荐) --------------------
  caddy:
    image: caddy:2.7-alpine           # 固定版本标签
    container_name: darkforest-caddy
    restart: always
    ports:
      - "80:80"                       # HTTP
      - "443:443"                     # HTTPS (自动 TLS)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data              # TLS 证书持久化
      - caddy-config:/config          # 配置持久化
    networks:
      - darkforest-net
    depends_on:
      - app
    # 安全配置
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE              # 需要绑定 80/443 特权端口
    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  prod-db-data:                       # 生产数据库持久化
  caddy-data:                         # Caddy TLS 证书数据
  caddy-config:                       # Caddy 配置数据

networks:
  darkforest-net:
    driver: bridge
