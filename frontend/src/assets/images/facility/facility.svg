<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>
  <!-- 能量核心 -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <!-- 结构框架 -->
  <polygon points="50,25 75,40 75,65 50,80 25,65 25,40" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <!-- 内部结构 -->
  <polygon points="50,35 65,45 65,60 50,70 35,60 35,45" fill="#f59e0b" opacity="0.3"/>
  <!-- 能量点 -->
  <circle cx="50" cy="50" r="8" fill="#fbbf24"/>
  <text x="50" y="95" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="sans-serif">设施</text>
</svg>
