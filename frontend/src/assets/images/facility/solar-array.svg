<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <!-- 中心图案：扇形展开的电池板 -->
  <g transform="translate(150, 200)scale(2.2)">
    <!-- 中心支柱 -->
    <line x1="0" y1="80" x2="0" y2="0" stroke="rgba(255,255,255,0.85)" stroke-width="3" />
    <circle cx="0" cy="0" r="8" fill="rgba(255,255,255,0.2)" />

    <!-- 左侧板 -->
    <g transform="rotate(-25)">
      <rect x="-60" y="-25" width="50" height="50" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" />
      <line x1="-50" y1="-25" x2="-50" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
      <line x1="-40" y1="-25" x2="-40" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
      <line x1="-30" y1="-25" x2="-30" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
      <line x1="-20" y1="-25" x2="-20" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
      <line x1="-10" y1="-25" x2="-10" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
    </g>

    <!-- 右侧板 -->
    <g transform="rotate(25)">
      <rect x="10" y="-25" width="50" height="50" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" />
      <line x1="20" y1="-25" x2="20" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
      <line x1="30" y1="-25" x2="30" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
      <line x1="40" y1="-25" x2="40" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
      <line x1="50" y1="-25" x2="50" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
      <line x1="60" y1="-25" x2="60" y2="25" stroke="rgba(255,255,255,0.85)" stroke-width="1" />
    </g>

    <!-- 能量光带 -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#27AE60" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
