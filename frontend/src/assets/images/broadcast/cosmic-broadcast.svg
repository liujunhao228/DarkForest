<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">

  <!-- 中心图案：全方位信号覆盖 -->
  <g transform="translate(150, 180) scale(1.8)">
    <!-- 外环虚线 -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#F2C94C" stroke-width="2" stroke-dasharray="15, 10" opacity="0.6" />

    <!-- 交叉光束 -->
    <line x1="-80" y1="0" x2="80" y2="0" stroke="rgba(255,255,255,0.85)" stroke-width="2" />
    <line x1="0" y1="-80" x2="0" y2="80" stroke="rgba(255,255,255,0.85)" stroke-width="2" />
    <line x1="-57" y1="-57" x2="57" y2="57" stroke="rgba(255,255,255,0.85)" stroke-width="2" />
    <line x1="57" y1="-57" x2="-57" y2="57" stroke="rgba(255,255,255,0.85)" stroke-width="2" />

    <!-- 中心核心 -->
    <circle cx="0" cy="0" r="12" fill="rgba(255,255,255,0.2)" />
    <circle cx="0" cy="0" r="25" fill="none" stroke="#F2C94C" stroke-width="2" />

    <!-- 四个方向的信号点 -->
    <circle cx="0" cy="-70" r="6" fill="#F2C94C" />
    <circle cx="0" cy="70" r="6" fill="#F2C94C" />
    <circle cx="-70" cy="0" r="6" fill="#F2C94C" />
    <circle cx="70" cy="0" r="6" fill="#F2C94C" />
  </g>

  <!-- 中心文字标签 -->
  <text class="text-center" x="150" y="340">合作</text>
</svg>
