<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">

  <!-- 中心图案：点对点跨越空间连接 -->
  <g transform="translate(150, 180) scale(1.8)">
    <!-- 左侧节点 -->
    <circle cx="-60" cy="0" r="15" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3" />
    <circle cx="-60" cy="0" r="8" fill="rgba(255,255,255,0.2)" />

    <!-- 右侧节点 -->
    <circle cx="60" cy="0" r="15" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3" />
    <circle cx="60" cy="0" r="8" fill="rgba(255,255,255,0.2)" />

    <!-- 中间能量束 -->
    <line x1="-42" y1="0" x2="42" y2="0" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-dasharray="6, 4" />

    <!-- 强调色电波 -->
    <path d="M -30 0 Q -15 -20 0 0 Q 15 20 30 0" fill="none" stroke="#F2C94C" stroke-width="3" />
    <path d="M -30 0 Q -15 20 0 0 Q 15 -20 30 0" fill="none" stroke="#F2C94C" stroke-width="3" />

    <!-- 距离弧线 -->
    <ellipse cx="0" cy="0" rx="100" ry="40" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1" opacity="0.7" />
  </g>

  <!-- 中心文字标签 -->
  <text class="text-center" x="150" y="340">合作</text>
</svg>
