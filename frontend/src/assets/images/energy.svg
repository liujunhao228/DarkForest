  <circle cx="50" cy="50" r="12" fill="#00d2ff"/>
  <!-- 能量线条 -->
  <line x1="50" y1="15" x2="50" y2="85" stroke="#00d2ff" stroke-width="2" opacity="0.5"/>
  <line x1="25" y1="30" x2="75" y2="70" stroke="#00d2ff" stroke-width="2" opacity="0.5"/>
  <line x1="75" y1="30" x2="25" y2="70" stroke="#00d2ff" stroke-width="2" opacity="0.5"/>
</svg>