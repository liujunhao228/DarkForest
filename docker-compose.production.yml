# ============================================================
# 黑暗森林 (Dark Forest) - 生产 Docker Compose
# 优化：日志管理、网络隔离、环境变量、优雅启停
# ============================================================

services:
  # -------------------- 主应用服务 --------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时参数（非敏感配置）
        - NODE_ENV=production
    container_name: darkforest-app
    restart: unless-stopped
    ports:
      - "3000:3000"                  # 直接暴露 HTTP 端口
      - "3003:3003"                  # 直接暴露 WebSocket 端口
    # ⚠️ 密钥必须通过环境变量传入，不要使用 env_file 提交到 Git
    environment:
      NODE_ENV: "production"
      DATABASE_URL: "file:/app/db/custom.db"
      JWT_SECRET: "${JWT_SECRET:?Error: JWT_SECRET is required}"
      ADMIN_SECRET_KEY: "${ADMIN_SECRET_KEY:?Error: ADMIN_SECRET_KEY is required}"
      NEXT_PUBLIC_WEBSOCKET_PORT: "${NEXT_PUBLIC_WEBSOCKET_PORT:-3003}"
      WEBSOCKET_PORT: "${WEBSOCKET_PORT:-3003}"
      PRISMA_LOG_LEVEL: "${PRISMA_LOG_LEVEL:-error}"
      NEXT_PUBLIC_BASE_URL: "${NEXT_PUBLIC_BASE_URL:-}"
    volumes:
      - dbdata:/app/db:rw           # 数据库持久化
    networks:
      - appnet                      # 应用网络
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"             # 单文件最大 10MB
        max-file: "3"               # 保留 3 个文件
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 128M
    stop_grace_period: 30s          # 优雅关闭宽限期

  # -------------------- Caddy 反向代理 --------------------
  caddy:
    image: caddy:2-alpine
    container_name: darkforest-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet                      # 与应用共享网络
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

# -------------------- 网络定义 --------------------
networks:
  appnet:
    driver: bridge
    name: darkforest-network

# -------------------- 持久化卷 --------------------
volumes:
  dbdata:
    name: darkforest-dbdata
    driver: local
  caddy_data:
    name: darkforest-caddy-data
    driver: local
  caddy_config:
    name: darkforest-caddy-config
    driver: local
