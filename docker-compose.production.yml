# ============================================================
# 黑暗森林 (Dark Forest) - 生产 Docker Compose
# 优化：资源限制、健康检查、日志管理、性能优化
# ============================================================

# 启用 BuildKit 加速构建
version: '3.8'

services:
  # -------------------- 主应用服务 --------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时参数（非敏感配置）
        - NODE_ENV=production
      # 启用 BuildKit 构建缓存
      cache_from:
        - type=local,src=/tmp/.buildx-cache
      cache_to:
        - type=local,dest=/tmp/.buildx-cache,mode=max
    container_name: darkforest-app
    restart: unless-stopped
    ports:
      - "3000:3000"                  # 直接暴露 HTTP 端口
      - "3003:3003"                  # 直接暴露 WebSocket 端口
    # ⚠️ 密钥必须通过环境变量传入，不要使用 env_file 提交到 Git
    environment:
      NODE_ENV: "production"
      DATABASE_URL: "file:/app/db/custom.db"
      JWT_SECRET: "${JWT_SECRET:?Error: JWT_SECRET is required}"
      ADMIN_SECRET_KEY: "${ADMIN_SECRET_KEY:?Error: ADMIN_SECRET_KEY is required}"
      NEXT_PUBLIC_WEBSOCKET_PORT: "${NEXT_PUBLIC_WEBSOCKET_PORT:-3003}"
      WEBSOCKET_PORT: "${WEBSOCKET_PORT:-3003}"
      PRISMA_LOG_LEVEL: "${PRISMA_LOG_LEVEL:-error}"
      NEXT_PUBLIC_BASE_URL: "${NEXT_PUBLIC_BASE_URL:-}"
      # 性能优化环境变量
      NODE_OPTIONS: "--max-old-space-size=512 --optimize-for-size --gc-interval=100"
      BUN_ENV: "production"
    volumes:
      - dbdata:/app/db:rw           # 数据库持久化
    networks:
      - appnet                      # 应用网络
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    # 增强日志配置
    logging:
      driver: json-file
      options:
        max-size: "10m"             # 单文件最大 10MB
        max-file: "3"               # 保留 3 个文件
        compress: "true"            # 压缩日志文件
    # 优化资源限制
    deploy:
      resources:
        limits:
          cpus: "1.5"               # 减少 CPU 限制，提高资源利用率
          memory: 768M              # 减少内存限制，优化内存使用
        reservations:
          cpus: "0.25"
          memory: 128M
    # 容器性能优化
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    stop_grace_period: 30s          # 优雅关闭宽限期

  # -------------------- Caddy 反向代理 --------------------
  caddy:
    image: caddy:2-alpine
    container_name: darkforest-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet                      # 与应用共享网络
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    deploy:
      resources:
        limits:
          cpus: "0.3"               # 减少 Caddy CPU 限制
          memory: 128M              # 减少 Caddy 内存限制
        reservations:
          cpus: "0.1"
          memory: 64M
    # 容器性能优化
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

# -------------------- 网络定义 --------------------
networks:
  appnet:
    driver: bridge
    name: darkforest-network
    # 网络优化
    driver_opts:
      com.docker.network.driver.mtu: "1500"

# -------------------- 持久化卷 --------------------
volumes:
  dbdata:
    name: darkforest-dbdata
    driver: local
    # 卷优化
    driver_opts:
      type: "none"
      o: "bind"
      device: "./data/db"
  caddy_data:
    name: darkforest-caddy-data
    driver: local
  caddy_config:
    name: darkforest-caddy-config
    driver: local
