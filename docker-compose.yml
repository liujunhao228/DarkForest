# ============================================================
# 黑暗森林 (Dark Forest) - Docker Compose (基础配置)
# 所有环境共享的基础配置
# 
# 用法:
#   开发: docker compose up (自动加载 docker-compose.override.yml)
#   生产: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # -------------------- 主应用 (Next.js + Bun) --------------------
  app:
    build:
      context: .
      target: dev                     # 默认使用开发阶段 (可被覆盖)
    container_name: darkforest-dev
    ports:
      - "3000:3000"                   # Next.js 主应用
      - "3003:3003"                   # WebSocket 服务器
    volumes:
      - .:/app                        # 源代码热重载
      - /app/node_modules             # 保护容器依赖
      - /app/.next                    # 保护构建缓存
      - dev-db-data:/app/db           # 数据库持久化
    # 环境变量通过 env_file 或覆盖文件注入
    # 不要在此硬编码密钥
    depends_on:
      init-db:
        condition: service_completed_successfully
    command: bun run dev
    networks:
      - darkforest-net
    # 优雅停机配置
    stop_grace_period: 15s
    stop_signal: SIGTERM

    # 健康检查 - Next.js 启动较慢，需要更长预热时间
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "-T", "10", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 日志大小限制 - 防止磁盘耗尽
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # -------------------- 数据库初始化 --------------------
  init-db:
    build:
      context: .
      target: dev
    container_name: darkforest-init-db
    volumes:
      - dev-db-data:/app/db
    environment:
      - DATABASE_URL=file:/app/db/custom.db
    command: sh -c "bun run db:generate && bun run db:push"
    networks:
      - darkforest-net

volumes:
  dev-db-data:                        # 开发数据库持久化

networks:
  darkforest-net:
    driver: bridge
