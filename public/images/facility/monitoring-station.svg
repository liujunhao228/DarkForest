<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>

  <!-- 主体：雷达接收塔 -->
  <g transform="translate(150, 180)">
    
    <!-- 1. 底座塔架 -->
    <!-- 主支柱 -->
    <line x1="0" y1="80" x2="0" y2="200" stroke="var(--stroke-color)" stroke-width="8" stroke-linecap="round" />
    <!-- 塔架斜撑 (A 字型结构) -->
    <line x1="-40" y1="200" x2="0" y2="80" stroke="var(--stroke-color)" stroke-width="4" />
    <line x1="40" y1="200" x2="0" y2="80" stroke="var(--stroke-color)" stroke-width="4" />
    <!-- 横梁 -->
    <line x1="-20" y1="140" x2="20" y2="140" stroke="var(--stroke-color)" stroke-width="3" />
    <line x1="-30" y1="170" x2="30" y2="170" stroke="var(--stroke-color)" stroke-width="3" />

    <!-- 2. 雷达天线 (网格状抛物面) -->
    <!-- 外框架 -->
    <path d="M -70 -20 Q -35 -80 0 -60 Q 35 -80 70 -20" fill="none" stroke="var(--stroke-color)" stroke-width="5" stroke-linecap="round" />
    
    <!-- 内部网格线 (模拟雷达骨架) -->
    <!-- 垂直经线 -->
    <path d="M -50 -25 Q -25 -70 0 -55 Q 25 -70 50 -25" fill="none" stroke="var(--stroke-color)" stroke-width="1.5" opacity="0.7" />
    <path d="M -30 -28 Q -15 -60 0 -50 Q 15 -60 30 -28" fill="none" stroke="var(--stroke-color)" stroke-width="1.5" opacity="0.7" />
    
    <!-- 水平纬线 -->
    <line x1="-65" y1="-10" x2="65" y2="-10" stroke="var(--stroke-color)" stroke-width="1.5" opacity="0.6" />
    <line x1="-55" y1="-35" x2="55" y2="-35" stroke="var(--stroke-color)" stroke-width="1.5" opacity="0.6" />
    <line x1="-35" y1="-55" x2="35" y2="-55" stroke="var(--stroke-color)" stroke-width="1.5" opacity="0.6" />

    <!-- 3. 馈源支架与接收器 -->
    <!-- 中心支撑杆 -->
    <line x1="0" y1="80" x2="0" y2="-45" stroke="var(--stroke-color)" stroke-width="3" />
    
    <!-- 馈源喇叭 (雷达核心接收部件) -->
    <path d="M -12 -45 L -8 -60 L 8 -60 L 12 -45 Z" fill="#27AE60" stroke="#1E8449" stroke-width="1" />
    <circle cx="0" cy="-60" r="4" fill="#27AE60" /> <!-- 喇叭口亮点 -->
    
    <!-- 4. 雷达信号波 -->
    <path d="M -40 -90 Q 0 -120 40 -90" fill="none" stroke="#27AE60" stroke-width="2.5" opacity="0.6" />
    <path d="M -55 -110 Q 0 -150 55 -110" fill="none" stroke="#27AE60" stroke-width="2" opacity="0.3" />
  </g>
</svg>
