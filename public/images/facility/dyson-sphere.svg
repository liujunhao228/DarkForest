<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>
  <!-- 中心图案：包裹恒星的巨大网格球体 -->
  <g transform="translate(150, 200) scale(1.6)">
    <!-- 核心光点 -->
    <circle cx="0" cy="0" r="20" fill="var(--bg-color)" opacity="0.9" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="var(--stroke-color)" stroke-width="1" opacity="0.5" />
    
    <!-- 球体骨架经线 -->
    <ellipse cx="0" cy="0" rx="70" ry="70" fill="none" stroke="var(--stroke-color)" stroke-width="1.5" />
    <ellipse cx="0" cy="0" rx="50" ry="70" fill="none" stroke="var(--stroke-color)" stroke-width="1" opacity="0.7" />
    <ellipse cx="0" cy="0" rx="70" ry="50" fill="none" stroke="var(--stroke-color)" stroke-width="1" opacity="0.7" />
    
    <!-- 纬线 -->
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="none" stroke="var(--stroke-color)" stroke-width="1" opacity="0.5" />
    <ellipse cx="0" cy="0" rx="65" ry="35" fill="none" stroke="var(--stroke-color)" stroke-width="1" opacity="0.5" />
    
    <!-- 能量采集点 -->
    <circle cx="0" cy="-70" r="6" fill="#27AE60" />
    <circle cx="0" cy="70" r="6" fill="#27AE60" />
    <circle cx="-70" cy="0" r="6" fill="#27AE60" />
    <circle cx="70" cy="0" r="6" fill="#27AE60" />
    
    <!-- 连接线 -->
    <line x1="0" y1="-70" x2="0" y2="-30" stroke="#27AE60" stroke-width="2" />
    <line x1="0" y1="70" x2="0" y2="30" stroke="#27AE60" stroke-width="2" />
    <line x1="-70" y1="0" x2="-30" y2="0" stroke="#27AE60" stroke-width="2" />
    <line x1="70" y1="0" x2="30" y2="0" stroke="#27AE60" stroke-width="2" />
  </g>
</svg>
