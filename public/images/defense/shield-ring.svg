<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>
  <!-- 中心图案：行星外的巨大圆环结构 -->
  <g transform="translate(150, 200) scale(1.8)">
    <!-- 中央行星 -->
    <circle cx="0" cy="0" r="30" fill="var(--bg-color)" stroke="var(--stroke-color)" stroke-width="2" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="var(--stroke-color)" stroke-width="1" opacity="0.5" />
    
    <!-- 倾斜的光环 -->
    <ellipse cx="0" cy="0" rx="85" ry="25" fill="none" stroke="var(--stroke-color)" stroke-width="3" transform="rotate(-20)" />
    <ellipse cx="0" cy="0" rx="85" ry="25" fill="none" stroke="#2D9CDB" stroke-width="2" transform="rotate(-20)" stroke-dasharray="20, 10" />
    
    <!-- 实体结构段 -->
    <path d="M -75 10 Q -75 30 -45 30" fill="none" stroke="#2D9CDB" stroke-width="5" transform="rotate(-20)" stroke-linecap="round" />
    <path d="M 75 -10 Q 75 -30 45 -30" fill="none" stroke="#2D9CDB" stroke-width="5" transform="rotate(-20)" stroke-linecap="round" />
    
    <!-- 防护能量场 -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#2D9CDB" stroke-width="1" opacity="0.3" stroke-dasharray="5, 5" />
  </g>
</svg>
