<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>
  <!-- 中心图案：光粒穿过恒星 -->
  <g transform="translate(150, 210) scale(1.8)">
    <!-- 恒星轮廓 -->
    <circle cx="40" cy="0" r="50" fill="none" stroke="var(--stroke-color)" stroke-width="2" />
    <circle cx="40" cy="0" r="35" fill="none" stroke="var(--stroke-color)" stroke-width="1" opacity="0.4" />
    
    <!-- 光粒轨迹 -->
    <line x1="-100" y1="0" x2="-30" y2="0" stroke="#EB5757" stroke-width="2" />
    <line x1="90" y1="0" x2="100" y2="0" stroke="#EB5757" stroke-width="2" />
    
    <!-- 光粒 -->
    <circle cx="-35" cy="0" r="5" fill="#EB5757" />
    <circle cx="-25" cy="0" r="3" fill="#EB5757" opacity="0.7" />
    <circle cx="-18" cy="0" r="2" fill="#EB5757" opacity="0.4" />
    
    <!-- 撞击点 -->
    <circle cx="-10" cy="0" r="8" fill="#EB5757" opacity="0.9" />
    
    <!-- 破碎效果 -->
    <line x1="-10" y1="-15" x2="-5" y2="-25" stroke="#EB5757" stroke-width="2" />
    <line x1="-10" y1="15" x2="-5" y2="25" stroke="#EB5757" stroke-width="2" />
    <line x1="10" y1="-15" x2="15" y2="-25" stroke="#EB5757" stroke-width="2" />
    <line x1="10" y1="15" x2="15" y2="25" stroke="#EB5757" stroke-width="2" />
  </g>
</svg>
