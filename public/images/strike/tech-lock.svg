<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>

  <g transform="translate(60, 60)">
    
    <!-- 电子轨道 (空轨) -->
    <g fill="none" stroke="#EB5757" stroke-width="2.5" opacity="0.8">
      <ellipse cx="0" cy="0" rx="38" ry="13" transform="rotate(0)" />
      <ellipse cx="0" cy="0" rx="38" ry="13" transform="rotate(60)" />
      <ellipse cx="0" cy="0" rx="38" ry="13" transform="rotate(120)" />
    </g>

    <!-- 智子 (悬浮在轨道外) -->
    
    <!-- 智子 1: 右上方悬浮 -->
    <g transform="rotate(0)">
      <circle cx="42" cy="-22" r="5" fill="#FF3333" />
    </g>

    <!-- 智子 2: 左侧悬浮 -->
    <g transform="rotate(60)">
      <circle cx="-42" cy="-22" r="5" fill="#FF3333" />
    </g>

    <!-- 智子 3: 下方悬浮 -->
    <g transform="rotate(120)">
      <circle cx="0" cy="26" r="5" fill="#FF3333" />
    </g>

    <!-- 核心锁头 -->
    <g transform="translate(0, 2)">
      <!-- 锁扣 (U 形) -->
      <path d="M -12 6 L -12 -8 A 12 12 0 0 1 12 -8 L 12 6" 
            fill="none" 
            stroke="#7B241C" 
            stroke-width="6" 
            stroke-linecap="round"/>
            
      <!-- 锁身 -->
      <rect x="-18" y="6" width="36" height="28" rx="4" fill="#C0392B"/>
      
      <!-- 锁孔 -->
      <circle cx="0" cy="16" r="5" fill="#1A1A1A"/>
      <rect x="-2" y="16" width="4" height="10" fill="#1A1A1A" rx="1"/>
    </g>
    
  </g>
</svg>