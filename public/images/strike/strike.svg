<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>
  <!-- 打击光束 -->
  <line x1="20" y1="20" x2="80" y2="80" stroke="#ef4444" stroke-width="3" opacity="0.8"/>
  <line x1="25" y1="15" x2="85" y2="75" stroke="#f87171" stroke-width="2" opacity="0.5"/>
  <!-- 爆炸效果 -->
  <circle cx="70" cy="70" r="10" fill="#ef4444" opacity="0.8"/>
  <circle cx="70" cy="70" r="5" fill="#fca5a5"/>
  <!-- 目标标记 -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="50" y="90" text-anchor="middle" fill="#ef4444" font-size="10" font-family="sans-serif">打击</text>
</svg>
