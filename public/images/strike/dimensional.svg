<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>
  <!-- 中心图案：三维立方体被压扁为二维 -->
  <g transform="translate(150, 180) scale(1.8)">
    <!-- 原始立方体轮廓 (虚线) -->
    <g opacity="0.4">
      <path d="M -50 -50 L 50 -50 L 50 50 L -50 50 Z" fill="none" stroke="var(--stroke-color)" stroke-width="1.5" stroke-dasharray="4, 3" />
      <path d="M -30 -70 L 70 -70 L 70 30 L -30 30 Z" fill="none" stroke="var(--stroke-color)" stroke-width="1.5" stroke-dasharray="4, 3" />
      <line x1="-50" y1="-50" x2="-30" y2="-70" stroke="var(--stroke-color)" stroke-width="1" stroke-dasharray="4, 3" />
      <line x1="50" y1="-50" x2="70" y2="-70" stroke="var(--stroke-color)" stroke-width="1" stroke-dasharray="4, 3" />
      <line x1="50" y1="50" x2="70" y2="30" stroke="var(--stroke-color)" stroke-width="1" stroke-dasharray="4, 3" />
      <line x1="-50" y1="50" x2="-30" y2="30" stroke="var(--stroke-color)" stroke-width="1" stroke-dasharray="4, 3" />
    </g>
    
    <!-- 压扁的二维平面 -->
    <path d="M -70 40 L 70 40 L 50 70 L -90 70 Z" fill="#333333" stroke="var(--stroke-color)" stroke-width="2" />
    <path d="M -50 50 L 50 50" stroke="var(--stroke-color)" stroke-width="1" opacity="0.5" />
    <path d="M -60 55 L 60 55" stroke="var(--stroke-color)" stroke-width="1" opacity="0.3" />
    
    <!-- 压缩箭头 -->
    <path d="M -40 -80 L -40 -50" stroke="#EB5757" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)" />
    <path d="M 40 -80 L 40 -50" stroke="#EB5757" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)" />
    
    <!-- 箭头定义 -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#EB5757" />
      </marker>
    </defs>
  </g>
</svg>
