<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      :root {
        --fg-color: #1a1a1a;
        --bg-color: #FFFFFF;
        --stroke-color: #1a1a1a;
        --text-color: #1a1a1a;
      }
      .dark-theme {
        --fg-color: #FFFFFF;
        --bg-color: #1a1a1a;
        --stroke-color: #FFFFFF;
        --text-color: #FFFFFF;
      }
    </style>
  </defs>
  <!-- 信号波纹 -->
  <circle cx="50" cy="50" r="15" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.3"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.2"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.1"/>
  <!-- 中心点 -->
  <circle cx="50" cy="50" r="8" fill="#8b5cf6"/>
  <!-- 伪装标志 - 面具 -->
  <ellipse cx="50" cy="72" rx="15" ry="8" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="45" cy="70" r="2" fill="#a78bfa"/>
  <circle cx="55" cy="70" r="2" fill="#a78bfa"/>
  <text x="50" y="90" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="sans-serif">伪装</text>
</svg>
